    <line x1="18" y1="13" x2="46" y2="13" stroke="#84bdd9" stroke-width="1" opacity="0.55"/>
    <line x1="24" y1="19" x2="40" y2="19" stroke="#84bdd9" stroke-width="1" opacity="0.35"/>
  </g>

  <g transform="translate(128,0)">
    <!-- forest -->
    <polygon points="32,0 64,16 32,32 0,16" fill="#3e6f3d" stroke="#284826" />
    <polygon points="20,8 14,18 26,18" fill="#2f4f2d"/>
