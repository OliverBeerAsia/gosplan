    <polygon points="32,0 64,16 32,32 0,16" fill="#607d4c" stroke="#3d4b33" />
    <line x1="32" y1="0" x2="64" y2="16" class="line" opacity="0.35"/>
    <line x1="0" y1="16" x2="32" y2="32" class="line" opacity="0.45"/>
  </g>

  <g transform="translate(64,0)">
    <!-- water -->
