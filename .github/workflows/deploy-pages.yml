name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependency graph
        run: npm audit --audit-level=low

      - name: Validate authored art contract
        run: npm run check:art

      - name: Test authored art contract and fallbacks
        run: npm run test:art

      - name: Validate Pack 4A Khrushchyovka atlas
        run: npm run check:khrushchyovka

      - name: Validate Pack 4B courtyard atlas
        run: npm run check:courtyard

      - name: Validate deterministic environment composition
        run: npm run check:environment

      - name: Validate Pack 4A worker-housing benchmark
        run: npm run check:benchmark:pack4a

      - name: Validate Pack 4B courtyard benchmark
        run: npm run check:benchmark:pack4b

      - name: Validate checked-in visual evidence
        run: npm run check:visual-evidence

      - name: Validate elevation foundation
        run: npm run check:elevation

      - name: Validate interaction regressions
        run: npm run check:interaction

      - name: Validate shared world depth
        run: npm run check:depth

      - name: Validate legacy atlas
        run: npm run check:atlas

      - name: Validate simulation determinism
        run: npm run check:determinism

      - name: Build
        run: npm run build

      - name: Verify Pack 4A benchmark is absent from production
        run: npm run check:benchmark:pack4a:production

      - name: Verify Pack 4B benchmark is absent from production
        run: npm run check:benchmark:pack4b:production

      - name: Upload artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
